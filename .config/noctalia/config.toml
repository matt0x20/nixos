[bar.main]
concave_edge_corners = false
end = [
    "media",
    "tray",
    "notifications",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
font_family = "Adwaita Sans"
margin_ends = 0
panel_overlap = 0
position = "right"
radius = 0
scale = 1.1000000089406967
thickness = 48
widget_spacing = 14

[brightness]
enable_ddcutil = true

[location]
address = "Zakopane, Poland"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-3",
    "lockscreen-login-box@DP-6",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-6"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-6"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-6".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 256.0
    box_width = 1024.0
    cx = 1280.0
    cy = 336.0
    output = "DP-3"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        center_text = true
        clock_style = "digital"
        shadow = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 64.0
    box_width = 1024.0
    cx = 1280.0
    cy = 454.3984375
    output = "DP-3"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = false
        center_text = true
        format = "{:%D}"
        shadow = false

[shell]
app_icon_colorize = true
font_family = "Adwaita Sans"

    [shell.launcher.providers.emoji]
    global = false
    prefix = ":"

    [shell.panel]
    launcher_placement = "attached"

    [shell.screenshot]
    directory = "/home/matt/Pictures/Screenshots"

[theme]
community_palette = "Oxocarbon"
custom_palette = "matugen"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kitty", "qt" ]
    community_ids = [ "pywalfox", "obsidian", "vscode" ]

[theme.templates.user.kde]
input_path = '~$XDG_CONFIG_HOME/noctalia/templates/kde.colors.template'
output_path = '$XDG_CONFIG_HOME/.local/share/color-schemes/Noctalia.colors'

[wallpaper.default]
path = "/home/matt/Pictures/Wallpapers/foggy-city.jpg"

[wallpaper.last]
path = "/home/matt/Pictures/Wallpapers/foggy-city.jpg"

[wallpaper.monitors.DP-6]
path = "/home/matt/Pictures/Wallpapers/foggy-city.jpg"

[widget.network]
show_label = false
